<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <h1>Portfolio Tracker</h1>
                <div class="header-controls">
                    <button id="refreshBtn" class="btn-icon" title="Refresh prices">🔄</button>
                    <button id="addBtn" class="btn-icon" title="Add transaction">➕</button>
                    <button id="menuBtn" class="btn-icon" title="Menu">⋮</button>
                </div>
            </div>
            
            <div class="header-tabs">
                <button class="tab-btn active" data-tab="overview">Overview</button>
                <button class="tab-btn" data-tab="portfolios">Portfolios</button>
                <button class="tab-btn" data-tab="holdings">Holdings</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Overview Tab -->
            <section id="overview" class="tab-content active">
                <div class="summary-card">
                    <div class="summary-item">
                        <div class="summary-label">Total Value</div>
                        <div class="summary-value" id="totalValue">HK$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Daily Change</div>
                        <div class="summary-value" id="dailyChange">HK$0.00</div>
                        <div class="summary-percent" id="dailyPercent">+0.00%</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Total Gain/Loss</div>
                        <div class="summary-value" id="totalGain">HK$0.00</div>
                        <div class="summary-percent" id="totalPercent">+0.00%</div>
                    </div>
                </div>

                <div class="portfolio-list" id="portfolioList"></div>
            </section>

            <!-- Portfolios Tab -->
            <section id="portfolios" class="tab-content">
                <div class="table-container">
                    <table class="portfolio-table">
                        <thead>
                            <tr>
                                <th>Portfolio</th>
                                <th>Value</th>
                                <th>Cost</th>
                                <th>Gain/Loss</th>
                                <th>Return %</th>
                            </tr>
                        </thead>
                        <tbody id="portfolioTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Holdings Tab -->
            <section id="holdings" class="tab-content">
                <div class="holdings-container" id="holdingsContainer"></div>
            </section>
        </main>
    </div>

    <!-- Modal for Add Transaction -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Transaction</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="transactionForm">
                <div class="form-group">
                    <label>Portfolio</label>
                    <select id="portfolioSelect" required>
                        <option value="">Select portfolio</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Symbol</label>
                    <input type="text" id="symbolInput" placeholder="e.g., AAPL" required>
                </div>

                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="nameInput" placeholder="e.g., Apple Inc." required>
                </div>

                <div class="form-group">
                    <label>Exchange</label>
                    <input type="text" id="exchangeInput" placeholder="e.g., NMS" required>
                </div>

                <div class="form-group">
                    <label>Currency</label>
                    <select id="currencySelect" required>
                        <option value="USD">USD</option>
                        <option value="HKD">HKD</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Shares</label>
                        <input type="number" id="sharesInput" placeholder="0.00" step="0.00000001" required>
                    </div>
                    <div class="form-group">
                        <label>Price per Share</label>
                        <input type="number" id="priceInput" placeholder="0.00" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Transaction Date</label>
                    <input type="date" id="dateInput" required>
                </div>

                <div class="form-group">
                    <label>Transaction Time</label>
                    <input type="time" id="timeInput" required>
                </div>

                <div class="form-group">
                    <label>Exchange Rate</label>
                    <input type="number" id="exchangeRateInput" placeholder="1.0" step="0.0001">
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notesInput" placeholder="Optional notes"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Transaction</button>
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Auth -->
    <div id="authModal" class="modal active">
        <div class="modal-content auth-modal">
            <div class="modal-header">
                <h2>Sign In</h2>
            </div>
            <form id="authForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="signInBtn">Sign In</button>
                    <button type="button" class="btn-secondary" id="signUpBtn">Create Account</button>
                </div>
            </form>
            <div id="authError" class="auth-error"></div>
        </div>
    </div>

    <!-- Import Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
